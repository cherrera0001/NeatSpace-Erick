# Stack local de NeatSpace: PostgreSQL+PostGIS → migraciones+seed → API NestJS.
# Uso:  docker compose up --build
# Luego:  http://localhost:3000/v1/health   y   http://localhost:3000/v1/categories

services:
  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: neatspace
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d neatspace"]
      interval: 5s
      timeout: 5s
      retries: 15
    volumes:
      - dbdata:/var/lib/postgresql/data

  migrate:
    image: postgres:15
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: dev
    volumes:
      - ./db:/db:ro
    entrypoint:
      - bash
      - -c
      - |
        set -e
        # Idempotente: las migraciones NO usan IF NOT EXISTS, así que solo se aplican
        # si el esquema aún no existe (evita romper un re-`up` sobre el volumen persistente).
        if psql -h db -U postgres -d neatspace -tAc "SELECT to_regclass('public.usuario')" | grep -q usuario; then
          echo "esquema ya existe → salto migraciones"
        else
          for f in /db/migrations/0*.sql; do echo ">> $$f"; psql -h db -U postgres -d neatspace -v ON_ERROR_STOP=1 -f "$$f"; done
        fi
        # El seed sí es idempotente (ON CONFLICT); se aplica siempre.
        psql -h db -U postgres -d neatspace -v ON_ERROR_STOP=1 -f /db/seed.sql
        echo "migraciones + seed OK"

  api:
    build: ./server
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://postgres:dev@db:5432/neatspace
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  dbdata:
