name: QA

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-specs:
    name: Lint de contratos (Spectral)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Falla el build solo ante severidad 'error' (warnings/info no bloquean).
      - run: npm run lint:specs
