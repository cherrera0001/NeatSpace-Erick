name: QA

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-specs:
    name: Lint de contratos (Spectral)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Falla el build solo ante severidad 'error' (warnings/info no bloquean).
      - run: npm run lint:specs

  types:
    name: Tipos TS en sync con OpenAPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run gen:types
      # Falla si los tipos committeados quedaron desincronizados del contrato.
      - run: git diff --exit-code types/openapi.ts

  server-build:
    name: Stub NestJS compila
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - run: npm test

  migrate:
    name: Migraciones (PostgreSQL + PostGIS)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_PASSWORD: dev
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Aplicar migraciones en orden
        env:
          PGPASSWORD: dev
        run: |
          for f in db/migrations/0*.sql; do
            echo ">> $f"
            psql -h localhost -U postgres -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Smoke — el esquema levanta
        env:
          PGPASSWORD: dev
        run: psql -h localhost -U postgres -c "\dt"
