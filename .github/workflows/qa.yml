name: QA

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-specs:
    name: Lint de contratos (Spectral)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Falla el build solo ante severidad 'error' (warnings/info no bloquean).
      - run: npm run lint:specs

  types:
    name: Tipos TS en sync con OpenAPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run gen:types
      # Falla si los tipos committeados quedaron desincronizados del contrato.
      - run: git diff --exit-code types/openapi.ts

  server-build:
    name: Stub NestJS compila
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - run: npm test

  migrate:
    name: Migraciones (PostgreSQL + PostGIS)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_PASSWORD: dev
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Aplicar migraciones en orden
        env:
          PGPASSWORD: dev
        run: |
          for f in db/migrations/0*.sql; do
            echo ">> $f"
            psql -h localhost -U postgres -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Smoke — el esquema levanta
        env:
          PGPASSWORD: dev
        run: psql -h localhost -U postgres -c "\dt"
      - name: Tests de constraints (IN-1/IN-2/IN-3 contra PG real)
        env:
          PGPASSWORD: dev
        run: psql -h localhost -U postgres -v ON_ERROR_STOP=1 -f db/tests/constraints_test.sql

  stack:
    name: Stack completo (docker compose) — health + categorías
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Levantar stack (db + migraciones + seed + api)
        run: docker compose up -d --build
      - name: Esperar API y verificar /v1/health
        run: |
          for i in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/v1/health || true)
            echo "intento $i → $code"
            [ "$code" = "200" ] && break
            sleep 3
          done
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/v1/health)" = "200"
      - name: /v1/categories devuelve los datos sembrados
        run: |
          body=$(curl -s http://localhost:3000/v1/categories)
          echo "$body"
          echo "$body" | grep -q "Gasfitería"
      - name: /v1/categories respeta el filtro level del contrato
        run: |
          curl -s 'http://localhost:3000/v1/categories?level=2' | grep -q "Gasfitería"
          if curl -s 'http://localhost:3000/v1/categories?level=1' | grep -q "Gasfitería"; then
            echo "FALLO: level=1 no filtró (devolvió una categoría de nivel 2)"; exit 1; fi
      - name: Identidad real — registro + login + credenciales inválidas
        run: |
          reg=$(curl -s -w '\n%{http_code}' -X POST http://localhost:3000/v1/auth/register \
            -H 'Content-Type: application/json' \
            -d '{"nombre":"CI","email":"ci@demo.cl","password":"secreto8"}')
          echo "$reg"; echo "$reg" | tail -1 | grep -q 201; echo "$reg" | grep -q '"token"'
          log=$(curl -s -w '\n%{http_code}' -X POST http://localhost:3000/v1/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"ci@demo.cl","password":"secreto8"}')
          echo "$log"; echo "$log" | tail -1 | grep -q 200; echo "$log" | grep -q '"token"'
          bad=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:3000/v1/auth/login \
            -H 'Content-Type: application/json' -d '{"email":"ci@demo.cl","password":"malo"}')
          test "$bad" = "401"
      - name: Logs si falla
        if: failure()
        run: docker compose logs
      - name: Bajar stack
        if: always()
        run: docker compose down -v
